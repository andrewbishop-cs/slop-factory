paths: { episodes: episodes, ready_to_post: ready_to_post, models: models }
video: { width: 1080, height: 1920, fps: 30, target_duration_sec: 72, min_duration_sec: 62, min_shot_sec: 4, max_shot_sec: 7 }
image: { backend: mflux, model: flux2-klein-4b, steps: 4, guidance: 1.0, use_references: true }  # klein-4b: Apache-2.0, multi-reference consistency (distilled → guidance must be 1.0)
hook:  { backend: ltx, max_seconds: 4, allow_library_fallback: true }
tts:   { backend: kokoro, narrator_voice: af_heart, speed: 1.0 }  # narrator reads narration; quoted dialogue uses the character's bible voice
music: { backend: ace-step, gain_under_voice: 0.18 }
captions: { font: assets/fonts/Bold.ttf, words_per_group: 4, position: lower_third, active_color: yellow }
audio: { target_lufs: -14, true_peak: -1.5 }
llm:   { model: claude-opus-4-8, effort: medium }
